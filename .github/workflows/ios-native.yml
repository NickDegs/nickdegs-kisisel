name: iOS Native → TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios-native/**'
      - '.github/workflows/ios-native.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build SwiftUI & Upload
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.app 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios-native
        run: xcodegen generate

      - name: Import Distribution Certificate
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$DIST_P12_BASE64" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -P "$DIST_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/nickdegs.mobileprovision

      - name: Decode ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive
        working-directory: ios-native
        run: |
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          xcodebuild archive \
            -project MoveLog.xcodeproj \
            -scheme MoveLog \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MoveLog.xcarchive \
            -destination "generic/platform=iOS" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            TARGETED_DEVICE_FAMILY=1 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="NickDegs Kisisel AppStore" \
            DEVELOPMENT_TEAM=SZF4T3P583 \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Export & Upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
            <key>provisioningProfiles</key>
            <dict><key>com.nickdegs.kisisel</key><string>${PROFILE_NAME}</string></dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MoveLog.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          echo "✅ Native build TestFlight'a yüklendi"

      - name: Auto-distribute to internal TestFlight
        continue-on-error: true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          pip3 install --quiet --break-system-packages cryptography 2>/dev/null || pip3 install --quiet cryptography
          python3 - <<'PY'
          import os, time, json, base64, urllib.request, urllib.error
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec, utils
          KID = os.environ["ASC_KEY_ID"]; ISS = os.environ["ASC_ISSUER_ID"]
          APP = "6780779399"
          GROUPS = ["8de9367e-e636-426d-a574-86fa0d69e7f5", "3f83e5d0-92f0-4917-be9d-9fb2ee53eb9a"]
          key = serialization.load_pem_private_key(
              open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{KID}.p8"), "rb").read(), password=None)
          def b64(d): return base64.urlsafe_b64encode(d).rstrip(b"=")
          def jwt():
              now = int(time.time())
              h = b64(json.dumps({"alg": "ES256", "kid": KID, "typ": "JWT"}).encode())
              p = b64(json.dumps({"iss": ISS, "iat": now, "exp": now + 1000, "aud": "appstoreconnect-v1"}).encode())
              si = h + b"." + p
              r, s = utils.decode_dss_signature(key.sign(si, ec.ECDSA(hashes.SHA256())))
              return (si + b"." + b64(r.to_bytes(32, "big") + s.to_bytes(32, "big"))).decode()
          def api(method, path, body=None):
              req = urllib.request.Request("https://api.appstoreconnect.apple.com" + path,
                  data=json.dumps(body).encode() if body else None, method=method,
                  headers={"Authorization": "Bearer " + jwt(), "Content-Type": "application/json"})
              try:
                  r = urllib.request.urlopen(req); return r.status, json.loads(r.read() or b"{}")
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()
          bid = None
          for _ in range(30):
              s, d = api("GET", f"/v1/builds?filter[app]={APP}&limit=1&sort=-uploadedDate")
              if isinstance(d, dict) and d.get("data"):
                  b = d["data"][0]; st = b["attributes"]["processingState"]
                  print("build", b["attributes"]["version"], st)
                  if st == "VALID": bid = b["id"]; break
                  if st in ("FAILED", "INVALID"): break
              time.sleep(30)
          if bid:
              for g in GROUPS:
                  s, _ = api("POST", f"/v1/betaGroups/{g}/relationships/builds", {"data": [{"type": "builds", "id": bid}]})
                  print("assign", g, s)
              print("✅ iç teste otomatik atandı")
          else:
              print("build VALID olmadı, atama atlandı")
          PY
