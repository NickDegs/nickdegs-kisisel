name: iPad Sign-in Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ipad:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.app 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: ios-native
        run: xcodegen generate

      - name: Build for Simulator
        working-directory: ios-native
        run: |
          xcodebuild build \
            -project MoveLog.xcodeproj -scheme MoveLog \
            -sdk iphonesimulator -configuration Debug \
            -derivedDataPath dd \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | tail -4
          echo "APP=$(pwd)/dd/Build/Products/Debug-iphonesimulator/MoveLog.app" >> $GITHUB_ENV

      - name: Boot iPad + verify sign-in
        working-directory: ios-native
        run: |
          set -e
          BUNDLE=com.nickdegs.kisisel
          OUT="$(pwd)/ipad"; mkdir -p "$OUT"
          # iOS 18+ destekleyen MODERN iPad seç (eski iPad'ler deployment target 18.0'ı çalıştıramaz)
          RUNTIME=$(xcrun simctl list runtimes iOS | grep -oE "com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+" | tail -1)
          echo "runtime: $RUNTIME"
          UDID=""
          for DEV in "iPad Pro 13-inch (M4)" "iPad Pro 11-inch (M4)" "iPad Air 13-inch (M2)" "iPad Air 11-inch (M2)" "iPad (A16)" "iPad (10th generation)" "iPad mini (A17 Pro)"; do
            UDID=$(xcrun simctl create "ipad-check" "$DEV" "$RUNTIME" 2>/dev/null) && { echo "iPad: $DEV"; break; } || UDID=""
          done
          [ -z "$UDID" ] && { echo "❌ uygun iPad oluşturulamadı"; exit 1; }
          xcrun simctl boot "$UDID"; xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "$APP"
          # 1) düz açılış = giriş ekranı (iPad'de render + alanlar)
          xcrun simctl launch "$UDID" "$BUNDLE" >/dev/null; sleep 5
          xcrun simctl io "$UDID" screenshot "$OUT/ipad_login.png"
          # 2) gerçek giriş (canlı API'ye) — başarılıysa ana ekran/tab bar görünür
          xcrun simctl terminate "$UDID" "$BUNDLE" 2>/dev/null || true
          xcrun simctl launch "$UDID" "$BUNDLE" "AUTOLOGIN=appreview:Review-Move-2026" >/dev/null
          sleep 12
          xcrun simctl io "$UDID" screenshot "$OUT/ipad_after_login_12s.png"
          sleep 10
          xcrun simctl io "$UDID" screenshot "$OUT/ipad_after_login.png"
          xcrun simctl shutdown "$UDID" || true
          xcrun simctl delete "$UDID" || true
          echo "iPad doğrulama görselleri hazır."

      - uses: actions/upload-artifact@v4
        with:
          name: ipad-signin
          path: ios-native/ipad/*.png
          retention-days: 5
