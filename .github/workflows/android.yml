name: Android → Play

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'android/**'
      - 'capacitor.config.json'
      - '.github/workflows/android.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps + sync web
        run: |
          npm install
          npx cap sync android

      - name: Versiyon (build number = epoch, <2.1 milyar)
        working-directory: android
        run: |
          VC=$(date -u +%s)
          sed -i "s/versionCode 1/versionCode $VC/" app/build.gradle
          echo "versionCode=$VC"

      - name: Decode upload keystore
        run: echo "${{ secrets.MOVELOG_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/movelog.keystore

      - name: Build AAB (signed)
        working-directory: android
        env:
          MOVELOG_KEYSTORE: ${{ runner.temp }}/movelog.keystore
          MOVELOG_KS_PASS: ${{ secrets.MOVELOG_KS_PASS }}
        run: ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: movelog-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.movelog
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
