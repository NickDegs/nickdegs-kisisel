name: Android Native → Play

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Versiyon (build number = epoch)
        run: echo "BUILD_NUMBER=$(date -u +%s)" >> "$GITHUB_ENV"

      - name: Decode upload keystore
        run: echo "${{ secrets.MOVELOG_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/movelog.keystore"

      - name: Build AAB (signed)
        env:
          MOVELOG_KEYSTORE: ${{ runner.temp }}/movelog.keystore
          MOVELOG_KS_PASS: ${{ secrets.MOVELOG_KS_PASS }}
        run: gradle bundleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: movelog-native-aab
          path: android-native/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.movelog
          releaseFiles: android-native/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
