name: MoveLog
options:
  bundleIdPrefix: com.nickdegs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: SZF4T3P583
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  MoveLog:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.kisisel
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: MoveLog.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Move Log"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Profil ve sohbet fotoğraflarını seçmek için."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Rota videolarını galerine kaydetmek için."
        INFOPLIST_KEY_NSCameraUsageDescription: "Fotoğraf çekip paylaşmak için."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Move Log; yürüyüş, bisiklet, motosiklet ve koşu rotalarını haritada kaydetmek, mesafe ve hızını hesaplamak ve izin verdiğin aile/arkadaşlarına canlı konumunu göstermek için konumunu kullanır. Örneğin bisiklet rotanı çizer ve eklediğin kişilerin nerede olduğunu görmesini sağlar."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Move Log, yalnızca bir gezi kaydı açıkken konumunu arka planda kullanır; böylece ekran kapalıyken bile tüm rotan kaydedilir ve otomatik rota videona dönüştürülür. Örneğin motosiklet sürüşünde uygulama arka plandayken rotan kaydedilerek rota filmin oluşturulur. Arka plan konumu yalnızca aktif kayıt ve senin açtığın canlı konum paylaşımı sırasında kullanılır."
        INFOPLIST_KEY_UIBackgroundModes: location
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
